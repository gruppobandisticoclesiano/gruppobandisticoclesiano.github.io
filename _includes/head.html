<head>
    <meta charset="utf-8">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="{{ site.theme_color }}">
    {% if page.robots %}
    <meta name="robots" content="{{ page.robots }}">
    {% endif %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:locale" content="it_IT">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ page.image | default: site.default_image | absolute_url }}">
    <meta property="og:image:alt" content="{{ page.image_alt | default: 'Il Gruppo Bandistico Clesiano in concerto' }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ page.image | default: site.default_image | absolute_url }}">
    {% unless page.no_schema %}
    {% include schema-music-group.html %}
    {% endunless %}

    <title>{{ page.title }}</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    {% if page.preload_image %}
    <link rel="preload" as="image" href="{{ page.preload_image }}">
    {% endif %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    {% if page.css %}
    <link rel="stylesheet" href="{{ page.css }}">
    {% endif %}
</head>
